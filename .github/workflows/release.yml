name: Release Constitution

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Convert via Pandoc
        run: |
          docker run --rm \
            --volume "$PWD:/data" \
            --entrypoint sh \
            pandoc/latex:latest \
            -c '
              tlmgr update --self &&
              tlmgr install collection-latexrecommended collection-langjapanese &&
              pandoc constitution.md \
                --pdf-engine=lualatex \
                --output constitution.pdf
            '

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ github.run_number }} constitution.pdf \
            --target "${{ github.sha }}" \
            --title "v${{ github.run_number }}" \
            --generate-notes
